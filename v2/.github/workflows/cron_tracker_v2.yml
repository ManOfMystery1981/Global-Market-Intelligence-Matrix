name: GMIM v2 System Health Monitor

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install requests yfinance

      - name: Verify Data Sources
        env:
          COINGECKO_API_KEY:     ${{ secrets.COINGECKO_API_KEY }}
          FINNHUB_API_KEY:       ${{ secrets.FINNHUB_API_KEY }}
          FRED_API_KEY:          ${{ secrets.FRED_API_KEY }}
        run: |
          python - <<'EOF'
          import urllib.request, json, os, sys

          results = {}

          # Check CoinGecko
          try:
              key = os.getenv("COINGECKO_API_KEY","")
              url = f"https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd"
              if key: url += f"&x_cg_demo_api_key={key}"
              with urllib.request.urlopen(url, timeout=10) as r:
                  data = json.loads(r.read())
              results["CoinGecko"] = f"✅ BTC=${data['bitcoin']['usd']:,.0f}"
          except Exception as e:
              results["CoinGecko"] = f"❌ {e}"

          # Check FRED
          try:
              key = os.getenv("FRED_API_KEY","")
              if key:
                  url = f"https://api.stlouisfed.org/fred/series/observations?series_id=FEDFUNDS&api_key={key}&file_type=json&limit=1&sort_order=desc"
                  with urllib.request.urlopen(url, timeout=10) as r:
                      data = json.loads(r.read())
                  val = data["observations"][0]["value"]
                  results["FRED"] = f"✅ Fed Funds={val}%"
              else:
                  results["FRED"] = "⚠️  No API key"
          except Exception as e:
              results["FRED"] = f"❌ {e}"

          # Check DefiLlama (no key needed)
          try:
              url = "https://api.llama.fi/chains"
              with urllib.request.urlopen(url, timeout=10) as r:
                  data = json.loads(r.read())
              results["DefiLlama"] = f"✅ {len(data)} chains tracked"
          except Exception as e:
              results["DefiLlama"] = f"❌ {e}"

          print("\n📊 GMIM v2 System Health Report")
          print("="*40)
          failed = 0
          for source, status in results.items():
              print(f"  {source}: {status}")
              if "❌" in status:
                  failed += 1
          print("="*40)
          print(f"  Status: {'🟢 ALL OK' if failed == 0 else f'🔴 {failed} SOURCE(S) FAILING'}")

          if failed > 0:
              sys.exit(1)
          EOF

      - name: Notify on Failure
        if: failure()
        run: echo "Health check failed — check data source API keys in GitHub Secrets"
