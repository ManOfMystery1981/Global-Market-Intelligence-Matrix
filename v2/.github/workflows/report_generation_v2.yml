name: GMIM v2 Report Generation Pipeline

on:
  schedule:
    - cron: '0 13 * * 1'  # Every Monday at 13:00 UTC
  workflow_dispatch:       # Manual trigger from Actions tab

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 120   # 2 hours — local inference loop can take time

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: v2/requirements.txt

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r v2/requirements.txt

      - name: Start Ollama Container
        run: |
          docker run -d \
            -p 11434:11434 \
            --name ollama \
            ollama/ollama:latest
          echo "Waiting for Ollama to be ready..."
          for i in {1..30}; do
            if curl -s http://localhost:11434/api/tags > /dev/null 2>&1; then
              echo "✅ Ollama is ready."
              break
            fi
            sleep 5
          done

      - name: Pull Writer Model (finance-llama-8b)
        run: |
          docker exec ollama ollama pull finance-llama-8b
          echo "✅ Writer model ready: finance-llama-8b"

      - name: Pull Auditor Model (deepseek-r1:7b)
        run: |
          docker exec ollama ollama pull deepseek-r1:7b
          echo "✅ Auditor model ready: deepseek-r1:7b"

      - name: Run Data Collection + Report Generation
        working-directory: v2
        env:
          # ── Inference Mode (local = free Ollama, cloud = paid APIs) ──
          WRITER_MODE:            local
          AUDITOR_MODE:           local
          OLLAMA_HOST:            http://localhost:11434
          # ── Data API Keys ──
          COINGECKO_API_KEY:      ${{ secrets.COINGECKO_API_KEY }}
          COINMARKETCAP_API_KEY:  ${{ secrets.COINMARKETCAP_API_KEY }}
          POLYGON_API_KEY:        ${{ secrets.POLYGON_API_KEY }}
          FINNHUB_API_KEY:        ${{ secrets.FINNHUB_API_KEY }}
          FMP_API_KEY:            ${{ secrets.FMP_API_KEY }}
          FRED_API_KEY:           ${{ secrets.FRED_API_KEY }}
          MESSARI_API_KEY:        ${{ secrets.MESSARI_API_KEY }}
          ALPHA_VANTAGE_API_KEY:  ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          # ── Cloud AI Keys (optional upgrade path — leave blank for local) ──
          DEEPSEEK_API_KEY:       ${{ secrets.DEEPSEEK_API_KEY }}
          GROK_API_KEY:           ${{ secrets.GROK_API_KEY }}
          # ── Delivery ──
          RESEND_API_KEY:         ${{ secrets.RESEND_API_KEY }}
          FROM_EMAIL:             ${{ secrets.FROM_EMAIL }}
        run: |
          python - <<'EOF'
          import sys, os
          sys.path.insert(0, '.')
          from backend.bots.data_collector import collect_all_data
          from backend.bots.collaborative_writer import generate_report
          from backend.bots.delivery_agent import send_report

          print("📡 Collecting market data...")
          market_data = collect_all_data()
          print(f"✅ Data collected from {market_data.get('source_count', 0)} sources")

          print("✍️  Generating report...")
          report_result = generate_report(market_data, "Weekly Market Intelligence Brief")
          print(f"✅ Report complete: {report_result['final_score']}/100 in {report_result['iterations_used']} iterations")

          # Deliver to all active subscribers
          import json
          subscribers_path = os.path.join(os.path.dirname(__file__), '..', 'subscribers.json')
          try:
              with open(subscribers_path) as f:
                  subscribers = json.load(f)
              active = [s for s in subscribers if s.get('status') == 'active']
              print(f"📧 Delivering to {len(active)} active subscribers...")
              for subscriber in active:
                  send_report(subscriber['email'], report_result, market_data)
                  print(f"  ✓ Delivered to {subscriber['email']}")
          except FileNotFoundError:
              print("No subscribers.json found — skipping delivery")
          EOF

      - name: Upload Report Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: intelligence-reports-${{ github.run_id }}
          path: v2/reports/
          retention-days: 30
