# ==============================================================================
# nginx_ssl_secure.conf
# Production SSL/TLS Handshake Armor (Post-Certbot Generation Blueprint)
# ==============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name globalmatrix.ai www.globalmatrix.ai;
    
    # Force immediate, permanent redirection from HTTP to secure HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name  gmim.dedyn.io;

    # Absolute Cryptographic Paths (Populated natively by Certbot Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/GMIM.dedyn.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/GMIM.dedyn.io/privkey.pem;

    # Protocols & Ciphers: Enforce strict modern cipher parameters (TLS 1.2 & 1.3 only)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA256:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA256";

    # SSL Session Optimization to keep system memory usage low
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Active proxy locations to map down to your Flask backends...
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/billing/webhook {
        proxy_pass http://127.0.0.1:4242;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 128k;
    }
}
