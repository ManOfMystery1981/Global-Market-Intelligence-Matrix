# ==============================================================================
# nginx_matrix_proxy.conf
# Institutional Reverse Proxy Configuration (A+ Compliance Tier)
# ==============================================================================

# Upstream definitions for internal port boundary isolation
upstream web_gateway_backend {
    server 127.0.0.1:8080;
    keepalive 32;
}

upstream billing_gateway_backend {
    server 127.0.0.1:4242;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name globalmatrix.ai www.globalmatrix.ai;

    # Enforce strict audit logging trails for institutional review
    access_log /var/log/nginx/matrix_access.log;
    error_log /var/log/nginx/matrix_error.log warn;

    # Global security headers to prevent clickjacking and XSS leaks
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline';" always;

    # Node 1: Public Landing and Dynamic Sitemap Index Web Routing
    location / {
        proxy_pass http://web_gateway_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        # Enforce proxy context header tracks
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Performance buffers to shield internal Flask threads
        proxy_buffers 8 16k;
        proxy_buffer_size 32k;
    }

    # Node 2: Secure Cryptographic Stripe Billing Webhook Receiver
    location /api/v1/billing/webhook {
        proxy_pass http://billing_gateway_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Anti-Flood Protection: Enforce strict connection timeout gates
        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 15s;
        
        # Block malicious oversized request payloads
        client_max_body_size 128k;
    }
}
