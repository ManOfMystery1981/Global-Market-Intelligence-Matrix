# ==============================================================================
# dependabot.yml
# Institutional Autopilot Core: Tracks and Updates System Package Dependencies
# ==============================================================================
version: 2

updates:
  - package-ecosystem: "pip" # Fixed: Shifted away from npm_and_yarn to native Python requirements
    directory: "/"
    schedule:
      interval: "weekly" # Runs checks once a week to prevent burst pipeline spam
    open-pull-requests-limit: 5
    allow:
      - dependency-type: "direct" # Prioritizes upper-tier dependency upgrades

  - package-ecosystem: "github-actions" # Automatically updates checkout@v4, setup-python@v5, etc.
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
