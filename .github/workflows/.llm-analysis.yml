# .github/workflows/llm-analysis.yml
name: LLM Tech Analyst - Automated Report Generation

on:
  # Run on schedule (daily at 6 AM UTC)
  schedule:
    - cron: '0 6 * * *'
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:
    inputs:
      email:
        description: 'Send report to this email (optional)'
        required: false
        default: ''
      test_mode:
        description: 'Run in test mode (no email sent)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  generate-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # --- Step 1: Checkout Code ---
      - name: Checkout Repository
        uses: actions/checkout@v4

      # --- Step 2: Setup Python ---
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      # --- Step 3: Install Python Dependencies ---
      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install requests reportlab matplotlib beautifulsoup4 lxml resend

      # --- Step 4: Install Ollama ---
      - name: Install Ollama
        uses: pydantic/ollama-action@v3
        with:
          model: qwen2:0.5b  # Small, fast, works on CPU
          # Alternative models (comment out qwen2 and uncomment below for larger models):
          # model: llama3.2:1b
          # model: mistral:7b-q4_0

      # --- Step 5: Run the LLM Analyst Bot ---
      - name: Run LLM Analyst Bot
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          MOONPAY_WEBHOOK_SECRET: ${{ secrets.MOONPAY_WEBHOOK_SECRET }}
          CUSTOMER_EMAIL: ${{ github.event.inputs.email || 'dsull1981@gmail.com' }}
          TEST_MODE: ${{ github.event.inputs.test_mode || 'false' }}
        run: |
          # Run the bot which generates the LLM article and saves it
          python llm_analyst_bot.py

      # --- Step 6: Generate PDF Report with Article ---
      - name: Generate Full PDF Report
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          CUSTOMER_EMAIL: ${{ github.event.inputs.email || 'dsull1981@gmail.com' }}
          TEST_MODE: ${{ github.event.inputs.test_mode || 'false' }}
        run: |
          # This triggers your delivery_bot.py which now includes the LLM article
          python delivery_bot.py $CUSTOMER_EMAIL $([ "$TEST_MODE" == "true" ] && echo "--test")

      # --- Step 7: Upload Artifacts (Reports and Articles) ---
      - name: Upload Report Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: generated-reports
          path: |
            analyst_article_*.md
            Global_Software_Trends_Report.pdf
            market_intelligence.md
          retention-days: 30

      # --- Step 8: Send Notification (Optional) ---
      - name: Send Status Notification
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Report generation completed successfully!"
          else
            echo "❌ Report generation failed. Check logs."
            exit 1
          fi
