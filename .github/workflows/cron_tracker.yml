# .github/workflows/cron_tracker.yml
name: Cron Tracker - Automated System Monitoring

on:
  schedule:
    # Runs every 5 minutes to keep the system responsive
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  track:
    runs-on: ubuntu-latest
    # Timeout after 2 minutes to save quota
    timeout-minutes: 2
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run System Tracker
        env:
          # Pass only necessary environment variables
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 sol_tracker.py
