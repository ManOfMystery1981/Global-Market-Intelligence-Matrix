name: Autonomous Multi-Agent Corporate Engine

on:
  schedule:
    - cron: '*/30 * * * *' # Automatically wakes up and executes every 30 minutes 24/7
  workflow_dispatch: # Keeps your manual browser trigger button active

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code Base
      uses: actions/checkout@v4

    - name: Setup System Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Provision Core Libraries
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 solana solders

    - name: Execute Corporate Boardroom
      env:
        CORPORATE_EMAIL_API_KEY: ${{ secrets.CORPORATE_EMAIL_API_KEY }}
        CORPORATE_SENDER_EMAIL: ${{ secrets.CORPORATE_SENDER_EMAIL }}
        CUSTOMER_DESTINATION_EMAIL: ${{ secrets.CUSTOMER_DESTINATION_EMAIL }}
        HELIUS_API_KEY: ${{ secrets.HELIUS_API_KEY }}
      run: |
        python3 sol_tracker.py
