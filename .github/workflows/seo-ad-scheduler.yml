name: Autonomous SEO & Advertisement Broadcaster

on:
  schedule:
    # Runs the multi-agent engine automatically every 12 hours out of the cloud
    - cron: '0 */12 * * *'
  workflow_dispatch:
    # Allows you to manually trigger a test execution run via the GitHub UI dashboard

jobs:
  broadcast-ads:
    name: broadcast-ads
    runs-on: ubuntu-latest
    
    steps:
      # 1. CRITICAL SECURE FIX: Natively pull your code files from GitHub onto the runner instance first
      - name: Check out target repository code matrix
        uses: actions/checkout@v4

      # 2. Deploy your clean Python compilation baseline microservice container
      - name: Initialize Setup Python Environment Runtime
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. Handle dependency packages setup cleanly across the partition matrix
      - name: Install System Dependency Packages
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 4. Fire your master background multi-agent refinery loops natively in the cloud
      - name: Run Solana Daemon Engine Tracking Loops
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FALLBACK_EMAIL_USER: ${{ secrets.FALLBACK_EMAIL_USER }}
          FALLBACK_EMAIL_PASS: ${{ secrets.FALLBACK_EMAIL_PASS }}
          HELIUS_API_KEY: ${{ secrets.HELIUS_API_KEY }}
        run: |
          python3 crypto_price_extractor.py
