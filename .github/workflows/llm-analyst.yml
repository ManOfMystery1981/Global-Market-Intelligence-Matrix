# .github/workflows/llm-analyst.yml
name: LLM Tech Analyst

on:
  # Run on schedule (daily at 6 AM)
  schedule:
    - cron: '0 6 * * *'
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      email:
        description: 'Send report to email'
        required: false

jobs:
  generate-analysis:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install requests reportlab matplotlib beautifulsoup4 lxml

      - name: Run LLM Analyst Bot
        env:
          LLM_API_URL: ${{ secrets.LLM_API_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          python llm_analyst_bot.py

      - name: Upload Article
        uses: actions/upload-artifact@v4
        with:
          name: analyst-article
          path: analyst_article_*.md
